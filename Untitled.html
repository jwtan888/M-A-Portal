<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cash Flow & Invest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .card { background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="p-4 pb-10">

    <header class="mb-6 text-center">
        <h1 class="text-2xl font-bold text-slate-800">Financial Dashboard</h1>
        <p class="text-slate-500 text-sm">Track flow & simulate growth</p>
    </header>

    <div class="card p-6 mb-6">
        <h2 class="text-lg font-semibold mb-4 text-indigo-600">Monthly Cash Flow</h2>
        <div class="space-y-4">
            <div>
                <label class="block text-xs font-medium text-slate-500 uppercase">Monthly Income</label>
                <input type="number" id="income" placeholder="5000" class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" oninput="calculateFlow()">
            </div>
            <div>
                <label class="block text-xs font-medium text-slate-500 uppercase">Monthly Expenses</label>
                <input type="number" id="expenses" placeholder="3000" class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" oninput="calculateFlow()">
            </div>
            <div class="pt-4 border-t border-slate-100">
                <div class="flex justify-between items-center">
                    <span class="text-slate-600 font-medium">Monthly Surplus:</span>
                    <span id="surplus" class="text-xl font-bold text-emerald-600">$0</span>
                </div>
            </div>
        </div>
    </div>

    <div class="card p-6 mb-6">
        <h2 class="text-lg font-semibold mb-4 text-blue-600">Investment Projection</h2>
        <div class="space-y-4">
            <div>
                <label class="block text-xs font-medium text-slate-500 uppercase">Expected Annual Return (%)</label>
                <input type="number" id="ror" value="7" class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-lg outline-none" oninput="calculateInvestment()">
            </div>
            <div>
                <label class="block text-xs font-medium text-slate-500 uppercase">Time Horizon (Years)</label>
                <select id="years" class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-lg outline-none" onchange="calculateInvestment()">
                    <option value="5">5 Years</option>
                    <option value="10" selected>10 Years</option>
                    <option value="20">20 Years</option>
                    <option value="30">30 Years</option>
                </select>
            </div>
        </div>

        <div class="mt-6 p-4 bg-blue-50 rounded-xl">
            <p class="text-xs text-blue-600 font-bold uppercase mb-1">Projected Portfolio Value</p>
            <h3 id="futureValue" class="text-3xl font-bold text-blue-800">$0</h3>
            <p class="text-xs text-blue-500 mt-2 italic">*Assumes monthly surplus is invested at the end of each month.</p>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-4">
        <div class="card p-4 text-center">
            <p class="text-xs text-slate-400 uppercase">Savings Rate</p>
            <p id="savingsRate" class="text-lg font-bold text-slate-700">0%</p>
        </div>
        <div class="card p-4 text-center">
            <p class="text-xs text-slate-400 uppercase">Daily Budget</p>
            <p id="dailyBudget" class="text-lg font-bold text-slate-700">$0</p>
        </div>
    </div>

    <script>
        function calculateFlow() {
            const income = parseFloat(document.getElementById('income').value) || 0;
            const expenses = parseFloat(document.getElementById('expenses').value) || 0;
            const surplus = income - expenses;
            
            document.getElementById('surplus').innerText = '$' + surplus.toLocaleString();
            
            // Savings Rate
            const rate = income > 0 ? (surplus / income * 100).toFixed(1) : 0;
            document.getElementById('savingsRate').innerText = rate + '%';
            
            // Daily Budget (based on 30 days)
            const daily = (expenses / 30).toFixed(2);
            document.getElementById('dailyBudget').innerText = '$' + daily;

            calculateInvestment();
        }

        function calculateInvestment() {
            const surplus = parseFloat(document.getElementById('income').value || 0) - parseFloat(document.getElementById('expenses').value || 0);
            const annualRate = parseFloat(document.getElementById('ror').value) / 100 || 0;
            const years = parseInt(document.getElementById('years').value);
            
            if (surplus <= 0) {
                document.getElementById('futureValue').innerText = '$0';
                return;
            }

            const monthlyRate = annualRate / 12;
            const months = years * 12;
            
            // Future Value of an Ordinary Annuity Formula: P * [((1 + r)^n - 1) / r]
            let fv = 0;
            if (monthlyRate === 0) {
                fv = surplus * months;
            } else {
                fv = surplus * ((Math.pow(1 + monthlyRate, months) - 1) / monthlyRate);
            }

            document.getElementById('futureValue').innerText = '$' + Math.round(fv).toLocaleString();
        }
    </script>
</body>
</html>
