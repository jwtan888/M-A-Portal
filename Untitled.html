<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cash Flow</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f2f5; }
        .box { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        h2 { color: #1a73e8; margin-top: 0; }
        .result { font-size: 24px; font-weight: bold; color: #34a853; }
    </style>
</head>
<body>

    <h1>Financial Dashboard</h1>

    <div class="box">
        <h2>Monthly Flow</h2>
        <label>Monthly Income ($)</label>
        <input type="number" id="inc" placeholder="0" oninput="calc()">
        
        <label>Monthly Expenses ($)</label>
        <input type="number" id="exp" placeholder="0" oninput="calc()">
        
        <p>Monthly Surplus: <span id="surp" class="result">$0</span></p>
    </div>

    <div class="box">
        <h2>Investment (7% Return)</h2>
        <label>Years to Invest</label>
        <select id="yrs" onchange="calc()">
            <option value="5">5 Years</option>
            <option value="10" selected>10 Years</option>
            <option value="20">20 Years</option>
        </select>
        <p>Projected Value: <span id="fv" class="result" style="color:#1a73e8">$0</span></p>
    </div>

    <script>
        function calc() {
            let i = parseFloat(document.getElementById('inc').value) || 0;
            let e = parseFloat(document.getElementById('exp').value) || 0;
            let s = i - e;
            document.getElementById('surp').innerText = '$' + s.toLocaleString();

            let y = parseInt(document.getElementById('yrs').value);
            let r = 0.07 / 12;
            let m = y * 12;
            let total = s > 0 ? s * ((Math.pow(1 + r, m) - 1) / r) : 0;
            document.getElementById('fv').innerText = '$' + Math.round(total).toLocaleString();
        }
    </script>
</body>
</html>
